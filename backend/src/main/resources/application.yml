server:
  port: 8080

spring:
  application:
    name: codesync-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/codesync}
    username: ${DATABASE_USER:codesync}
    password: ${DATABASE_PASSWORD:codesync}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-local-development-only-change-me}
  expiration: 86400000 # 24 hours in ms

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
